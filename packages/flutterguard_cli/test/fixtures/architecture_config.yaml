include:
  - "**/*.dart"
exclude: []
rules:
  large_file:
    enabled: true
    maxLines: 500
  large_class:
    enabled: true
    maxLines: 300
  large_build_method:
    enabled: true
    maxLines: 80
  lifecycle_resource:
    enabled: true
architecture:
  layers:
    - name: ui
      path: "**/boundary_issue.dart"
      allowed_deps: []
    - name: model
      path: "**/forbidden_file.dart"
      allowed_deps: []
  modules:
    - name: feature_a
      path: "**/boundary_issue.dart"
      allowed_deps: []
    - name: feature_b
      path: "**/forbidden_file.dart"
      allowed_deps: []
  detect_cycles: false
