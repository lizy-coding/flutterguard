include:
  - "**/*.dart"
exclude: []
rules:
  large_file:
    enabled: true
    maxLines: 500
  large_class:
    enabled: true
    maxLines: 300
  large_build_method:
    enabled: true
    maxLines: 80
  lifecycle_resource:
    enabled: true
boundaries:
  - name: "feature_b"
    from: "**/boundary_issue.dart"
    forbidden:
      - "**/forbidden_file.dart"
