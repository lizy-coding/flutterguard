name: flutterguard_cli
description: CLI tool for static architecture scanning and CI gating.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  args: ^2.5.0
  analyzer: ^7.3.0
  glob: ^2.1.2
  path: ^1.9.0
  yaml: ^3.1.2
  flutterguard_core:
    path: ../flutterguard_core

executables:
  flutterguard: flutterguard

dev_dependencies:
  test: ^1.25.8
  lints: ^3.0.0
