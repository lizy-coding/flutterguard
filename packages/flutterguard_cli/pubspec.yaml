name: flutterguard_cli
description: IoT Flutter static analysis CLI for architecture enforcement, code quality, and CI gating. Scans Dart source for layer violations, lifecycle resource leaks, circular dependencies, and more.
version: 0.3.0
repository: https://github.com/lizy-coding/flutterguard
issue_tracker: https://github.com/lizy-coding/flutterguard/issues
topics:
  - static-analysis
  - flutter
  - iot
  - architecture
  - cli

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  args: ^2.5.0
  analyzer: ^7.3.0
  glob: ^2.1.2
  path: ^1.9.0
  yaml: ^3.1.2

executables:
  flutterguard: flutterguard

dev_dependencies:
  test: ^1.25.8
  lints: ^3.0.0
