include:
  - lib/**

exclude:
  - lib/generated/**
  - lib/**.g.dart
  - lib/**.freezed.dart
  - lib/**.mocks.dart

rules:
  large_file:
    enabled: true
    maxLines: 500
  large_class:
    enabled: true
    maxLines: 300
  large_build_method:
    enabled: true
    maxLines: 80
  lifecycle_resource:
    enabled: true
  missing_const_constructor:
    enabled: true
  side_effect_in_build:
    enabled: true
    severity: high
    allowlist: []
    ignore_paths: []
  state_manager_created_in_build:
    enabled: true
    severity: high
    allowlist: []
    ignore_paths: []
  mutable_state_exposed:
    enabled: true
    severity: medium
    allowlist: []
    ignore_paths: []
  state_layer_ui_dependency:
    enabled: true
    severity: high
    allowlist: []
    ignore_paths: []
  state_dependency_cycle:
    enabled: true
    severity: high
    allowlist: []
    ignore_paths: []
  riverpod_read_used_for_render:
    enabled: true
    severity: medium
    allowlist: []
    ignore_paths: []
  riverpod_watch_in_callback:
    enabled: true
    severity: medium
    allowlist: []
    ignore_paths: []
  bloc_equatable_props_incomplete:
    enabled: true
    severity: medium
    allowlist: []
    ignore_paths: []
  provider_value_lifecycle_misuse:
    enabled: true
    severity: medium
    allowlist: []
    ignore_paths: []
  notify_listeners_in_loop:
    enabled: true
    severity: medium
    allowlist: []
    ignore_paths: []

state_management:
  enabled: true
  framework_auto_detect: true
  confidence_threshold: certain

