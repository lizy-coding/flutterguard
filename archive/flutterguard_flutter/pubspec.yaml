name: flutterguard_flutter
description: Flutter runtime integration for FlutterGuard - error hooks, route observer, frame metrics, and GuardBoundary.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutterguard_core:
    path: ../flutterguard_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
